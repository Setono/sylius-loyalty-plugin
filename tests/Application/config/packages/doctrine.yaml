parameters:
    # Adds a fallback DATABASE_URL if the env var is not set.
    # This allows you to run cache:warmup even if your
    # environment variables are not available yet.
    # You should not need to change this value.
    env(DATABASE_URL): ''

doctrine:
    dbal:
        driver: 'pdo_mysql'
        server_version: '5.7'
        charset: UTF8
        # Required for nested transactions: the ledger wraps writes in a transaction, and the DAMA
        # test bundle wraps each functional test in an outer transaction it rolls back.
        use_savepoints: true

        url: '%env(resolve:DATABASE_URL)%'

    orm:
        auto_mapping: true
        mappings:
            App:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/Model'
                prefix: 'Setono\SyliusLoyaltyPlugin\Tests\Application\Model'
                alias: App
