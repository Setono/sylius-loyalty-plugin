# Public aliases so functional tests can fetch plugin services that do not yet have a production
# consumer (and would otherwise be pruned as unused private services).
services:
    test.setono_sylius_loyalty.ledger:
        alias: 'Setono\SyliusLoyaltyPlugin\Ledger\LoyaltyLedger'
        public: true
    test.setono_sylius_loyalty.order_points_awarder:
        alias: 'Setono\SyliusLoyaltyPlugin\Earning\OrderPointsAwarder'
        public: true
    test.setono_sylius_loyalty.transaction_repository:
        alias: 'setono_sylius_loyalty.repository.transaction'
        public: true
